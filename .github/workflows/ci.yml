name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install -r requirements_dev.txt
      - name: Run tests
        run: pytest tests/ -v
      - name: Syntax check
        run: python -m py_compile custom_components/solvis_remote/__init__.py

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate manifest.json
        run: python -c "import json; json.load(open('custom_components/solvis_remote/manifest.json'))"
      - name: Validate hacs.json
        run: python -c "import json; json.load(open('hacs.json'))"
